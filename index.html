<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="hospitalizacion.css">

</head>
<body class="h-100 w-100 mx-3">
    <h1 class="text-center py-2">
        salas de hospitalizacion
    </h1>
    <div class="row container-xl">
        <div class="pushable card col-3 border p-0" id="contenedorSalas">
            <div class="card-header fw-bold bg-success-subtle text-center ">
                UCI
            </div>
            <div class="card-body">camas</div>
        </div>
           </div>
           <div class="row container-xl d-none" id="contenedorCamas">
            <div class="pushable card col-3 border p-1 m-1 cama">
                <div class="card-header fw-bold bg-success-subtle text-center">
                cama 1
                </div>
                <div class="card-body">paciente: pedro perez</div>
            </div>
            <div class="pushable card col-3 border p-1 m-1 cama">
                <div class="card-header fw-bold bg-success-subtle text-center">
                cama 2
                </div>
                <div class="card-body">paciente: juan luis</div>
            </div>
               </div>
</body>
</html>
<script>
    document.getElementById("contenedorSalas").addEventListener("click",function(){
        document.getElementById("contenedorCamas").classList.remove("d-none");
        this.classList.add("d-none")
    })
    document.querySelectorAll(".cama div").forEach((el)=>{
        el.addEventListener("click",function(){
            document.getElementById("contenedorSalas").classList.remove("d-none");
            document.getElementById("contenedorCamas").classList.add("d-none")
        })
    })
    

    
</script>
